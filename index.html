<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accounts Receivable Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #080c10;
    --surface:  #0d1520;
    --surface2: #111c2a;
    --border:   #1e2d40;
    --border2:  #243447;
    --accent:   #00d4ff;
    --accent2:  #0099cc;
    --green:    #00e5a0;
    --amber:    #ffb340;
    --red:      #ff4d6a;
    --purple:   #b97aff;
    --purple2:  #8a44e0;
    --teal:     #00cfb4;
    --teal2:    #009e89;
    --muted:    #4a6480;
    --text:     #d0e8ff;
    --text2:    #8aabb8;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'Syne', sans-serif;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px;
    background-image:
      radial-gradient(ellipse 60% 40% at 80% 0%,  rgba(0,212,255,.06) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 10% 100%, rgba(0,229,160,.04) 0%, transparent 55%);
  }

  .header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; flex-wrap:wrap; gap:10px; }
  .header h1 { font-size:22px; font-weight:800; letter-spacing:-.4px; }
  .header h1 span { color:var(--accent); }
  .header p { font-size:11px; color:var(--muted); margin-top:3px; font-family:var(--mono); }

  .ctrl-bar {
    display:flex; align-items:center; gap:10px; flex-wrap:wrap;
    padding:10px 14px; margin-bottom:22px;
    background:var(--surface); border:1px solid var(--border); border-radius:10px;
  }
  .load-btn {
    padding:7px 18px; border:none; border-radius:6px; cursor:pointer;
    font-size:12px; font-weight:700; font-family:var(--sans);
    background:var(--accent); color:#080c10;
    transition:opacity .15s, transform .1s; letter-spacing:.3px;
  }
  .load-btn:hover:not(:disabled) { opacity:.88; transform:translateY(-1px); }
  .load-btn:disabled { opacity:.4; cursor:not-allowed; }
  .prog-wrap { flex:1; min-width:80px; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
  .prog-bar  { height:100%; width:0%; background:linear-gradient(90deg,var(--accent2),var(--accent)); border-radius:2px; transition:width .3s; }
  .status-txt { font-size:11px; color:var(--muted); white-space:nowrap; font-family:var(--mono); }
  .err-box {
    color:var(--red); background:rgba(255,77,106,.07); border:1px solid rgba(255,77,106,.25);
    border-radius:8px; padding:12px 16px; font-size:13px; margin-bottom:16px;
  }

  .kpi-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(165px,1fr)); gap:14px; margin-bottom:22px; }
  .kpi-card {
    background:var(--surface); border:1px solid var(--border); border-radius:12px;
    padding:16px 18px; position:relative; overflow:hidden;
    animation:fadeUp .4s ease both;
  }
  .kpi-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,var(--accent2),var(--accent)); opacity:.7;
  }
  .kpi-card.green::before  { background:linear-gradient(90deg,#00b378,var(--green)); }
  .kpi-card.amber::before  { background:linear-gradient(90deg,#cc8a00,var(--amber)); }
  .kpi-card.red::before    { background:linear-gradient(90deg,#cc2240,var(--red)); }
  .kpi-card.purple::before { background:linear-gradient(90deg,var(--purple2),var(--purple)); }
  .kpi-card.teal::before   { background:linear-gradient(90deg,var(--teal2),var(--teal)); }
  .kpi-label { font-size:10px; font-family:var(--mono); color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .kpi-value { font-size:22px; font-weight:800; letter-spacing:-1px; line-height:1.1; }
  .kpi-value.accent { color:var(--accent); }
  .kpi-value.green  { color:var(--green); }
  .kpi-value.amber  { color:var(--amber); }
  .kpi-value.red    { color:var(--red); }
  .kpi-value.purple { color:var(--purple); }
  .kpi-value.teal   { color:var(--teal); }
  .kpi-sub { font-size:11px; color:var(--muted); margin-top:5px; font-family:var(--mono); }

  .toolbar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
  .search-wrap { position:relative; flex:1; min-width:200px; }
  .search-wrap svg { position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; }
  .search-input {
    width:100%; padding:8px 12px 8px 34px;
    background:var(--surface); border:1px solid var(--border2);
    border-radius:8px; color:var(--text); font-size:13px; font-family:var(--sans);
    outline:none; transition:border-color .2s;
  }
  .search-input:focus { border-color:var(--accent); }
  .search-input::placeholder { color:var(--muted); }
  .sort-select {
    padding:8px 12px; background:var(--surface); border:1px solid var(--border2);
    border-radius:8px; color:var(--text); font-size:13px; font-family:var(--sans);
    outline:none; cursor:pointer;
  }
  .filter-btn {
    padding:6px 13px; border-radius:7px; border:1px solid var(--border2);
    background:transparent; color:var(--text2); font-size:12px; font-family:var(--sans); cursor:pointer; transition:all .15s;
  }
  .filter-btn.active { background:rgba(0,212,255,.12); border-color:var(--accent); color:var(--accent); }
  .filter-btn:hover:not(.active) { color:var(--text); }

  .table-wrap {
    background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden;
    animation:fadeUp .5s .1s ease both;
  }
  .table-head {
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--border);
  }
  .table-head h2 { font-size:14px; font-weight:700; }
  .row-count { font-size:11px; font-family:var(--mono); color:var(--muted); }

  table { width:100%; border-collapse:collapse; }
  thead th {
    padding:10px 14px; text-align:left;
    font-size:10px; font-family:var(--mono); font-weight:600;
    text-transform:uppercase; letter-spacing:1px; color:var(--muted);
    background:var(--surface2); border-bottom:1px solid var(--border); white-space:nowrap;
  }
  thead th.r { text-align:right; }
  thead th.grp { border-left:1px solid var(--border2); }
  td.grp { border-left:1px solid rgba(255,255,255,.035); }

  tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
  tbody tr:last-child { border-bottom:none; }
  tbody tr:hover { background:rgba(0,212,255,.035); }
  td { padding:11px 14px; font-size:13px; vertical-align:middle; }
  td.r   { text-align:right; font-family:var(--mono); }
  td.dim { color:var(--text2); font-size:12px; font-family:var(--mono); }

  .bal-wrap { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
  .bal-amount { font-family:var(--mono); font-size:13px; }
  .bal-bar-track { width:80px; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
  .bal-bar-fill  { height:100%; border-radius:2px; background:linear-gradient(90deg,var(--accent2),var(--accent)); }
  .bal-bar-fill.red { background:linear-gradient(90deg,#cc2240,var(--red)); }

  .rec-cell { display:flex; flex-direction:column; align-items:flex-end; gap:2px; }
  .rec-date  { font-size:12px; font-family:var(--mono); color:var(--text); }
  .rec-ref   { font-size:10px; font-family:var(--mono); color:var(--muted); }
  .rec-none  { font-size:12px; font-family:var(--mono); color:var(--muted); }

  .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:10px; font-family:var(--mono); font-weight:600; letter-spacing:.5px; }
  .badge-active   { background:rgba(0,229,160,.12); color:var(--green); border:1px solid rgba(0,229,160,.25); }
  .badge-inactive { background:rgba(255,77,106,.10); color:var(--red);  border:1px solid rgba(255,77,106,.2); }

  .c-green  { color:var(--green); }
  .c-red    { color:var(--red); }
  .c-amber  { color:var(--amber); }
  .c-muted  { color:var(--muted); }
  .c-purple { color:var(--purple); }
  .c-teal   { color:var(--teal); }

  .cn-pill {
    display:inline-block; padding:1px 6px; border-radius:3px;
    font-size:10px; font-family:var(--mono); font-weight:600;
    background:rgba(185,122,255,.12); color:var(--purple);
    border:1px solid rgba(185,122,255,.25);
  }

  .pagination {
    display:flex; align-items:center; justify-content:center;
    gap:6px; padding:12px; border-top:1px solid var(--border); flex-wrap:wrap;
  }
  .pg-btn {
    padding:5px 11px; border-radius:6px; border:1px solid var(--border2);
    background:transparent; color:var(--text2); font-size:12px; font-family:var(--mono);
    cursor:pointer; transition:all .15s;
  }
  .pg-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .pg-btn.active { background:rgba(0,212,255,.15); border-color:var(--accent); color:var(--accent); }
  .pg-btn:disabled { opacity:.35; cursor:not-allowed; }
  .pg-info { font-size:11px; font-family:var(--mono); color:var(--muted); padding:0 6px; }

  .empty-state { padding:50px 20px; text-align:center; color:var(--muted); }
  .empty-state p { font-size:14px; margin-top:10px; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(14px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Accounts <span>Receivable</span> Dashboard</h1>
    <p>net sales + tax − credit notes − received = AR balance · manager.io</p>
  </div>
</div>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   fetchAllPages — paginated loader.
   DO NOT SIMPLIFY to a single fetch.
══════════════════════════════════ */
async function fetchAllPages(endpoint, onProgress) {
  const all     = [];
  let nextToken = null;
  let pageNum   = 0;
  let apiTotal  = null;

  do {
    const path = nextToken
      ? `${endpoint}?PageSize=99999&next_page_token=${encodeURIComponent(nextToken)}`
      : `${endpoint}?PageSize=99999`;

    const data = await postMessageWithResponse({ type:'api-request', method:'GET', path });
    const page = Array.isArray(data) ? data : (data.items || data.data || []);
    all.push(...page);

    nextToken = data.next_page_token || data.nextPageToken || data._links?.next?.href || null;

    if (apiTotal === null)
      apiTotal = data.totalCount ?? data.total ?? data.count ?? data._metadata?.totalCount ?? null;

    pageNum++;
    if (onProgress) onProgress(all.length, apiTotal, pageNum);
    if (pageNum >= 1000) break;
  } while (nextToken);

  return all;
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn    = document.getElementById('load-btn');
  const bar    = document.getElementById('prog-bar');
  const status = document.getElementById('status-txt');
  const app    = document.getElementById('app');

  btn.disabled    = true;
  btn.textContent = 'Loading…';
  bar.style.width = '0%';
  app.innerHTML   = '';

  try {
    status.textContent = 'Fetching customers…';
    const customers = await fetchAllPages('/api4/customer-batch', (n, t) => {
      status.textContent = `Customers · ${n}${t?'/'+t:''} loaded`;
      bar.style.width = '10%';
    });

    bar.style.width = '15%';
    status.textContent = 'Fetching tax codes…';

    /* Fetch tax codes and invoices together; probe one tax code record
       using a known UUID from the first invoice to discover the rate field */
    const [taxCodesRaw, invoices, receipts, creditNotes] = await Promise.all([
      fetchAllPages('/api4/tax-code-batch', () => {}),
      fetchAllPages('/api4/sales-invoice-batch', (n, t) => {
        status.textContent = `Invoices ${n}${t?'/'+t:''} · loading…`;
        if (t) bar.style.width = (15 + Math.round(n / t * 55)) + '%';
      }),
      fetchAllPages('/api4/receipt-batch',     () => {}),
      fetchAllPages('/api4/credit-note-batch', () => {})
    ]);

    bar.style.width = '75%';
    status.textContent = 'Resolving tax rates…';

    /* Probe a single tax code record by UUID to find the exact rate field */
    const probeResult = await probeTaxRateField(invoices);
    const taxRateMap  = buildTaxRateMap(taxCodesRaw, probeResult);
    bar.style.width = '100%';

    bar.style.width    = '100%';
    status.textContent = `✓ ${customers.length} customers · ${invoices.length} invoices · ${receipts.length} receipts · ${creditNotes.length} credit notes · ${taxCodesRaw.length} tax codes${probeResult ? ` · rate field: ${probeResult.candidates[0]?.path ?? 'found'}` : ''}`;
    btn.textContent    = '↺ Reload';
    btn.disabled       = false;

    render(customers, invoices, receipts, creditNotes, taxRateMap);

  } catch (err) {
    status.textContent = '⚠ ' + err.message;
    btn.textContent    = '↺ Retry';
    btn.disabled       = false;
    app.innerHTML = `<div class="err-box">⚠ ${err.message}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════
   probeTaxRateField
   Fetches ONE known tax code by key (taken
   from the first invoice line that has a taxCode)
   to discover which field holds the rate.

   Manager.io "Single rate" tax codes in api4
   return a structure like:
     item.components = [{ rate: 18, ... }]
   OR a flat:
     item.rate = 18

   We try every plausible field/path and return
   { field, path, value } for the one that gives
   a sensible non-zero number.
══════════════════════════════════ */
async function probeTaxRateField(invoices) {
  // Find the first invoice line that has a taxCode UUID
  for (const inv of invoices) {
    for (const line of (inv?.item?.lines ?? [])) {
      if (line?.taxCode) {
        try {
          const data = await postMessageWithResponse({
            type:'api-request', method:'GET',
            path:`/api4/tax-code?key=${line.taxCode}`
          });
          const item = data?.item ?? data;
          if (!item) continue;

          // Collect every numeric value we can find, with its path
          const candidates = [];

          // Direct fields
          for (const [k, v] of Object.entries(item)) {
            if (typeof v === 'number' && v > 0 && v <= 100) {
              candidates.push({ path: k, value: v });
            }
          }

          // components[0] fields
          if (Array.isArray(item.components)) {
            for (const [ci, comp] of item.components.entries()) {
              if (comp && typeof comp === 'object') {
                for (const [k, v] of Object.entries(comp)) {
                  if (typeof v === 'number' && v > 0 && v <= 100) {
                    candidates.push({ path: `components[${ci}].${k}`, value: v });
                  }
                }
              }
            }
          }

          return { taxCodeKey: line.taxCode, item, candidates };
        } catch { /* continue */ }
      }
    }
  }
  return null;
}

/* ══════════════════════════════════
   extractRateFromItem
   Given a raw tax-code item and the probed
   field path, extracts the effective rate.

   Supports:
     • components[].{field}  — sum all components
     • direct field on item
     • fallback scan
══════════════════════════════════ */
function extractRateFromItem(item, probeResult) {
  if (!item) return 0;

  // Use probed path if available
  if (probeResult?.candidates?.length > 0) {
    // Find the best candidate: prefer 'rate' in name, then highest plausibility
    const best = probeResult.candidates.find(c =>
      c.path.includes('rate') || c.path.includes('Rate')
    ) ?? probeResult.candidates[0];

    const pathParts = best.path.split('.');
    if (pathParts[0].startsWith('components')) {
      // Sum all components using this sub-field
      const subField = pathParts[1];
      if (Array.isArray(item.components)) {
        const sum = item.components.reduce((s, c) => s + Number(c?.[subField] ?? 0), 0);
        if (sum > 0) return normaliseRate(sum);
      }
    } else {
      const val = item[pathParts[0]];
      if (val != null && Number(val) !== 0) return normaliseRate(Number(val));
    }
  }

  // Fallback: known field names
  const known = ['rate','taxRate','percentage','ratePercentage','taxPercentage','percent','value'];
  for (const f of known) {
    if (item[f] != null && Number(item[f]) !== 0) return normaliseRate(Number(item[f]));
  }

  // Fallback: components[]
  if (Array.isArray(item.components) && item.components.length > 0) {
    for (const f of known) {
      const sum = item.components.reduce((s, c) => s + Number(c?.[f] ?? 0), 0);
      if (sum > 0) return normaliseRate(sum);
    }
    // Try any numeric field in first component
    const first = item.components[0];
    if (first) {
      for (const [k, v] of Object.entries(first)) {
        if (typeof v === 'number' && v > 0 && v <= 100) return normaliseRate(v);
      }
    }
  }

  // Last resort: any numeric field 0 < v ≤ 100 with rate/percent in name
  for (const [k, v] of Object.entries(item)) {
    if (typeof v !== 'number' || v <= 0 || v > 100) continue;
    const kl = k.toLowerCase();
    if (kl.includes('rate') || kl.includes('percent') || kl.includes('tax')) {
      return normaliseRate(v);
    }
  }

  return 0;
}

function normaliseRate(r) {
  // 0.18 → 18%, but 18 stays 18
  return (r > 0 && r <= 1) ? r * 100 : r;
}

/* ══════════════════════════════════
   buildTaxRateMap
   Returns: { [taxCodeKey]: ratePercent }
══════════════════════════════════ */
function buildTaxRateMap(taxCodesRaw, probeResult) {
  const map = {};
  for (const tc of taxCodesRaw) {
    const key  = tc?.key;
    const item = tc?.item;
    if (!key || !item) continue;
    map[key] = extractRateFromItem(item, probeResult);
  }
  return map;
}

/* ══════════════════════════════════
   invoiceLineNet
   Net line amount after discount, EXCLUDING tax.
   Uses pre-computed `total` field when available.
══════════════════════════════════ */
function invoiceLineNet(line) {
  if (!line) return 0;

  // Pre-computed total takes priority
  if (line.total != null && Number(line.total) !== 0) return Number(line.total);

  const qty   = Number(line.qty            ?? 0);
  const price = Number(line.salesUnitPrice ?? 0);
  const gross = qty * price;

  const discPct = Number(line.discountPercentage ?? 0);
  const discAmt = Number(line.discountAmount     ?? 0);

  if (discPct !== 0) return gross * (1 - discPct / 100);
  if (discAmt !== 0) return gross - discAmt;
  return gross;
}

/* ══════════════════════════════════
   invoiceLineTax
   Tax amount for ONE line.

   Priority:
     1. line.taxAmount (pre-computed) if non-zero
     2. Calculate via taxRateMap:
        • amountsIncludeTax=false (most common):
            tax = lineNet × rate/100
        • amountsIncludeTax=true (tax-inclusive):
            inclusive_net = lineNet / (1 + rate/100)
            tax           = lineNet − inclusive_net
══════════════════════════════════ */
function invoiceLineTax(line, amountsIncludeTax, taxRateMap) {
  if (!line) return 0;
  if (line.taxAmount != null && Number(line.taxAmount) !== 0) return Number(line.taxAmount);

  const taxCodeKey = line.taxCode;
  if (!taxCodeKey) return 0;

  const rate = taxRateMap[taxCodeKey] ?? 0;
  if (rate === 0) return 0;

  const lineNet = invoiceLineNet(line);

  if (amountsIncludeTax) {
    const excl = lineNet / (1 + rate / 100);
    return lineNet - excl;
  }
  return lineNet * (rate / 100);
}

/* ══════════════════════════════════
   invoiceTotals / creditNoteTotals
   Returns { net, tax, gross } for one document.
   gross = net + tax  (what the customer owes)
══════════════════════════════════ */
function invoiceTotals(item, taxRateMap) {
  if (!item) return { net:0, tax:0, gross:0 };
  const inclTax = item.amountsIncludeTax ?? false;
  let net = 0, tax = 0;
  for (const line of (item.lines ?? [])) {
    const lineTax = invoiceLineTax(line, inclTax, taxRateMap);
    const lineNet = invoiceLineNet(line);
    if (inclTax) {
      net += lineNet - lineTax;   // back out tax from inclusive amount
    } else {
      net += lineNet;
    }
    tax += lineTax;
  }
  return { net, tax, gross: net + tax };
}

const creditNoteTotals = invoiceTotals; // same structure

/* Total cash received from one receipt */
function receiptLineTotal(item) {
  return (item?.lines ?? []).reduce((s, l) => s + Number(l?.amount ?? 0), 0);
}

/* ══════════════════════════════════
   buildCustomerMap
   Per-customer aggregates:

   invoicedNet     — sum of line nets (after discount, excl. tax)
   invoicedTax     — sum of invoice tax
   invoicedGross   — invoicedNet + invoicedTax
   creditNet/Tax/Gross — same for credit notes
   netInvoiced     — invoicedGross − creditGross
   totalReceived   — cash in
   balance         — netInvoiced − totalReceived
══════════════════════════════════ */
function buildCustomerMap(invoices, receipts, creditNotes, taxRateMap) {
  const map = {};
  const ensure = id => {
    if (!map[id]) map[id] = {
      invoicedNet:0, invoicedTax:0, invoicedGross:0, invoiceCount:0,
      creditNet:0,   creditTax:0,   creditGross:0,   creditNoteCount:0,
      netInvoiced:0,
      totalReceived:0, receiptCount:0,
      balance:0,
      latestReceiptDate:null, latestReceiptAmount:0, latestReceiptRef:''
    };
    return map[id];
  };

  for (const inv of invoices) {
    const custId = inv?.item?.customer;
    if (!custId) continue;
    const { net, tax, gross } = invoiceTotals(inv?.item, taxRateMap);
    const e = ensure(custId);
    e.invoicedNet   += net;
    e.invoicedTax   += tax;
    e.invoicedGross += gross;
    e.invoiceCount  += 1;
  }

  for (const cn of creditNotes) {
    const custId = cn?.item?.customer;
    if (!custId) continue;
    const { net, tax, gross } = creditNoteTotals(cn?.item, taxRateMap);
    const e = ensure(custId);
    e.creditNet       += net;
    e.creditTax       += tax;
    e.creditGross     += gross;
    e.creditNoteCount += 1;
  }

  for (const rec of receipts) {
    const custId = rec?.item?.customer;
    if (!custId) continue;
    const amount = receiptLineTotal(rec?.item);
    const date   = rec?.item?.date ?? null;
    const ref    = rec?.item?.reference ?? rec?.item?.text ?? '';
    const e = ensure(custId);
    e.totalReceived += amount;
    e.receiptCount  += 1;
    if (date && (!e.latestReceiptDate || new Date(date) > new Date(e.latestReceiptDate))) {
      e.latestReceiptDate   = date;
      e.latestReceiptAmount = amount;
      e.latestReceiptRef    = ref;
    }
  }

  for (const id of Object.keys(map)) {
    map[id].netInvoiced = map[id].invoicedGross - map[id].creditGross;
    map[id].balance     = map[id].netInvoiced   - map[id].totalReceived;
  }

  return map;
}

/* ══════════════════════════════════ Helpers ══════════════════════════════════ */
const fmtN = (v, d=2) =>
  Number(v ?? 0).toLocaleString(undefined, { minimumFractionDigits:d, maximumFractionDigits:d });

const fmtDate = v => {
  if (!v) return null;
  const d = new Date(v);
  return isNaN(d) ? String(v) : d.toLocaleDateString(undefined, { day:'2-digit', month:'short', year:'numeric' });
};

const esc = s => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ══════════════════════════════════ App state ══════════════════════════════════ */
let _enriched   = [];
let _filtered   = [];
let _query      = '';
let _sortBy     = 'balance';
let _sortDir    = 'desc';
let _filterMode = 'all';
let _currentPg  = 1;
const PAGE_SIZE = 20;

function render(customers, invoices, receipts, creditNotes, taxRateMap) {
  const custMap = buildCustomerMap(invoices, receipts, creditNotes, taxRateMap);
  _enriched = customers.map(c => ({ ...c, _ar: custMap[c?.key] ?? null }));
  applyAndRender();
}

function applyAndRender() {
  let data = _enriched.filter(c => {
    const name = (c?.item?.name || '').toLowerCase();
    const code = (c?.item?.code || '').toLowerCase();
    const q    = _query.toLowerCase();
    if (q && !name.includes(q) && !code.includes(q)) return false;
    if (_filterMode === 'active')    return !c?.item?.inactive;
    if (_filterMode === 'inactive')  return  c?.item?.inactive;
    if (_filterMode === 'balance')   return  (c._ar?.balance ?? 0) > 0.005;
    if (_filterMode === 'settled')   return  (c._ar?.balance ?? 0) <= 0.005 && (c._ar?.invoiceCount ?? 0) > 0;
    if (_filterMode === 'noinvoice') return  (c._ar?.invoiceCount ?? 0) === 0;
    if (_filterMode === 'credited')  return  (c._ar?.creditNoteCount ?? 0) > 0;
    return true;
  });

  data.sort((a, b) => {
    let va, vb;
    switch (_sortBy) {
      case 'name':       va=(a?.item?.name||'').toLowerCase(); vb=(b?.item?.name||'').toLowerCase(); break;
      case 'code':       va=(a?.item?.code||'');               vb=(b?.item?.code||'');               break;
      case 'balance':    va=a._ar?.balance       ??-Infinity;  vb=b._ar?.balance       ??-Infinity;  break;
      case 'invoiced':   va=a._ar?.invoicedNet   ??-Infinity;  vb=b._ar?.invoicedNet   ??-Infinity;  break;
      case 'tax':        va=a._ar?.invoicedTax   ??-Infinity;  vb=b._ar?.invoicedTax   ??-Infinity;  break;
      case 'credited':   va=a._ar?.creditGross   ??-Infinity;  vb=b._ar?.creditGross   ??-Infinity;  break;
      case 'received':   va=a._ar?.totalReceived ??-Infinity;  vb=b._ar?.totalReceived ??-Infinity;  break;
      case 'latest_date':
        va=a._ar?.latestReceiptDate ? new Date(a._ar.latestReceiptDate).getTime() : -Infinity;
        vb=b._ar?.latestReceiptDate ? new Date(b._ar.latestReceiptDate).getTime() : -Infinity; break;
      default: va=(a?.item?.name||'').toLowerCase(); vb=(b?.item?.name||'').toLowerCase();
    }
    if (va < vb) return _sortDir==='asc' ? -1 :  1;
    if (va > vb) return _sortDir==='asc' ?  1 : -1;
    return 0;
  });

  _filtered  = data;
  _currentPg = 1;
  renderUI();
}

function renderUI() {
  const app = document.getElementById('app');

  if (_enriched.length === 0) {
    app.innerHTML = `<div class="empty-state"><p>No customer records found.</p></div>`;
    return;
  }

  const total              = _enriched.length;
  const activeCount        = _enriched.filter(c => !c?.item?.inactive).length;
  const totalInvoicedNet   = _enriched.reduce((s,c) => s + (c._ar?.invoicedNet   ?? 0), 0);
  const totalInvoicedTax   = _enriched.reduce((s,c) => s + (c._ar?.invoicedTax   ?? 0), 0);
  const totalInvoicedGross = _enriched.reduce((s,c) => s + (c._ar?.invoicedGross ?? 0), 0);
  const totalCredited      = _enriched.reduce((s,c) => s + (c._ar?.creditGross   ?? 0), 0);
  const totalReceived      = _enriched.reduce((s,c) => s + (c._ar?.totalReceived ?? 0), 0);
  const totalBalance       = _enriched.reduce((s,c) => s + (c._ar?.balance       ?? 0), 0);
  const withBalance        = _enriched.filter(c => (c._ar?.balance ?? 0) > 0.005).length;
  const withCreditNotes    = _enriched.filter(c => (c._ar?.creditNoteCount ?? 0) > 0).length;

  const start    = (_currentPg - 1) * PAGE_SIZE;
  const pageRows = _filtered.slice(start, start + PAGE_SIZE);
  const totalPgs = Math.ceil(_filtered.length / PAGE_SIZE) || 1;
  const maxBal   = Math.max(..._enriched.map(c => Math.abs(c._ar?.balance ?? 0)), 1);

  app.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Customers</div>
        <div class="kpi-value accent">${total.toLocaleString()}</div>
        <div class="kpi-sub">${activeCount} active · ${total-activeCount} inactive</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">Net Sales (excl. tax)</div>
        <div class="kpi-value amber">${fmtN(totalInvoicedNet)}</div>
        <div class="kpi-sub">after discounts · before tax</div>
      </div>
      <div class="kpi-card teal">
        <div class="kpi-label">Tax on Invoices</div>
        <div class="kpi-value teal">${fmtN(totalInvoicedTax)}</div>
        <div class="kpi-sub">gross total: ${fmtN(totalInvoicedGross)}</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">Total Credit Notes</div>
        <div class="kpi-value purple">${fmtN(totalCredited)}</div>
        <div class="kpi-sub">${withCreditNotes} customers · incl. tax</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Total Received</div>
        <div class="kpi-value green">${fmtN(totalReceived)}</div>
        <div class="kpi-sub">across all receipts</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">AR Balance Outstanding</div>
        <div class="kpi-value red">${fmtN(totalBalance)}</div>
        <div class="kpi-sub">${withBalance} customers with balance</div>
      </div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="search-inp"
          placeholder="Search by name or code…"
          value="${esc(_query)}" oninput="onSearch(this.value)">
      </div>
      <select class="sort-select" onchange="onSort(this.value)">
        <option value="balance"     ${_sortBy==='balance'  &&_sortDir==='desc'?'selected':''}>Balance (highest)</option>
        <option value="balance_a"   ${_sortBy==='balance'  &&_sortDir==='asc' ?'selected':''}>Balance (lowest)</option>
        <option value="name"        ${_sortBy==='name'     &&_sortDir==='asc' ?'selected':''}>Name A → Z</option>
        <option value="name_d"      ${_sortBy==='name'     &&_sortDir==='desc'?'selected':''}>Name Z → A</option>
        <option value="invoiced"    ${_sortBy==='invoiced'                    ?'selected':''}>Net Sales ↓</option>
        <option value="tax"         ${_sortBy==='tax'                         ?'selected':''}>Tax ↓</option>
        <option value="credited"    ${_sortBy==='credited'                    ?'selected':''}>Credit Notes ↓</option>
        <option value="received"    ${_sortBy==='received'                    ?'selected':''}>Received ↓</option>
        <option value="latest_date" ${_sortBy==='latest_date'                 ?'selected':''}>Latest Receipt ↓</option>
      </select>
      <button class="filter-btn ${_filterMode==='all'      ?'active':''}" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${_filterMode==='balance'  ?'active':''}" onclick="setFilter('balance')">Outstanding</button>
      <button class="filter-btn ${_filterMode==='settled'  ?'active':''}" onclick="setFilter('settled')">Settled</button>
      <button class="filter-btn ${_filterMode==='credited' ?'active':''}" onclick="setFilter('credited')">Has Credit Notes</button>
      <button class="filter-btn ${_filterMode==='active'   ?'active':''}" onclick="setFilter('active')">Active</button>
      <button class="filter-btn ${_filterMode==='noinvoice'?'active':''}" onclick="setFilter('noinvoice')">No Invoices</button>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <h2>Customer AR Summary</h2>
        <span class="row-count">${_filtered.length.toLocaleString()} matching · ${start+1}–${Math.min(start+PAGE_SIZE,_filtered.length)} shown</span>
      </div>

      ${pageRows.length === 0 ? `
        <div class="empty-state"><p>No results${_query?` for "${esc(_query)}"`:''}</p></div>` : `
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Code</th>
              <th>Status</th>
              <th class="r grp">Net Sales<br><span style="font-weight:400;opacity:.6">(excl. tax)</span></th>
              <th class="r">Tax</th>
              <th class="r">Gross Invoiced<br><span style="font-weight:400;opacity:.6">(net + tax)</span></th>
              <th class="r grp">Credit Notes<br><span style="font-weight:400;opacity:.6">(incl. tax)</span></th>
              <th class="r grp">Net Invoiced<br><span style="font-weight:400;opacity:.6">(gross − credits)</span></th>
              <th class="r">Received</th>
              <th class="r">AR Balance</th>
              <th class="r grp">Latest Receipt</th>
            </tr>
          </thead>
          <tbody>
            ${pageRows.map((c, i) => {
              const name     = c?.item?.name     || '—';
              const code     = c?.item?.code     || '—';
              const inactive = c?.item?.inactive ?? false;
              const ar       = c._ar;

              const invNet   = ar?.invoicedNet   ?? 0;
              const invTax   = ar?.invoicedTax   ?? 0;
              const invGross = ar?.invoicedGross ?? 0;
              const cnGross  = ar?.creditGross   ?? 0;
              const netInv   = ar?.netInvoiced   ?? 0;
              const received = ar?.totalReceived ?? 0;
              const balance  = ar?.balance       ?? 0;
              const recDate  = ar?.latestReceiptDate   ?? null;
              const recAmt   = ar?.latestReceiptAmount ?? 0;
              const recRef   = ar?.latestReceiptRef    ?? '';
              const recCount = ar?.receiptCount   ?? 0;
              const invCount = ar?.invoiceCount   ?? 0;
              const cnCount  = ar?.creditNoteCount?? 0;

              const statusBadge = inactive
                ? '<span class="badge badge-inactive">Inactive</span>'
                : '<span class="badge badge-active">Active</span>';

              const balClass = balance > 0.005 ? 'c-red' : balance < -0.005 ? 'c-amber' : 'c-muted';
              const barPct   = maxBal > 0 ? Math.round(Math.abs(balance)/maxBal*100) : 0;
              const barCls   = balance < -0.005 ? 'red' : '';

              const balCell = invCount > 0
                ? `<div class="bal-wrap">
                     <span class="bal-amount ${balClass}">${fmtN(balance)}</span>
                     <div class="bal-bar-track"><div class="bal-bar-fill ${barCls}" style="width:${barPct}%"></div></div>
                   </div>`
                : `<span class="c-muted">—</span>`;

              const cnCell = cnCount > 0
                ? `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
                     <span class="c-purple">${fmtN(cnGross)}</span>
                     <span class="cn-pill">${cnCount} note${cnCount>1?'s':''}</span>
                   </div>`
                : `<span class="c-muted">—</span>`;

              const taxCell = invCount > 0 && invTax !== 0
                ? `<span class="c-teal">${fmtN(invTax)}</span>`
                : `<span class="c-muted">${invCount>0?'0.00':'—'}</span>`;

              const recCell = recDate
                ? `<div class="rec-cell">
                     <span class="rec-date">${esc(fmtDate(recDate))}</span>
                     ${recRef ? `<span class="rec-ref">ref&nbsp;${esc(recRef)}</span>` : ''}
                     <span class="rec-ref">${fmtN(recAmt)}</span>
                   </div>`
                : `<span class="rec-none">—</span>`;

              return `<tr>
                <td class="dim">${start+i+1}</td>
                <td>
                  <div style="font-weight:600">${esc(name)}</div>
                  <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px">${invCount} inv · ${recCount} rec · ${cnCount} cn</div>
                </td>
                <td class="dim">${esc(code)}</td>
                <td>${statusBadge}</td>
                <td class="r grp">${invCount>0?`<span class="c-amber">${fmtN(invNet)}</span>`:'<span class="c-muted">—</span>'}</td>
                <td class="r">${taxCell}</td>
                <td class="r">${invCount>0?`<span>${fmtN(invGross)}</span>`:'<span class="c-muted">—</span>'}</td>
                <td class="r grp">${cnCell}</td>
                <td class="r grp">${invCount>0?`<span class="${cnCount>0?'c-amber':''}">${fmtN(netInv)}</span>`:'<span class="c-muted">—</span>'}</td>
                <td class="r">${recCount>0?`<span class="c-green">${fmtN(received)}</span>`:'<span class="c-muted">—</span>'}</td>
                <td class="r">${balCell}</td>
                <td class="r grp">${recCell}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}

      ${totalPgs > 1 ? `
      <div class="pagination">
        <button class="pg-btn" ${_currentPg===1       ?'disabled':''} onclick="goPage(${_currentPg-1})">‹ Prev</button>
        ${buildPagination(_currentPg, totalPgs)}
        <button class="pg-btn" ${_currentPg===totalPgs?'disabled':''} onclick="goPage(${_currentPg+1})">Next ›</button>
        <span class="pg-info">Page ${_currentPg} / ${totalPgs}</span>
      </div>` : ''}
    </div>
  `;
}

function buildPagination(cur, total) {
  let html = '', prev = null;
  const pages = [];
  for (let i=1; i<=total; i++) {
    if (i===1 || i===total || (i>=cur-2 && i<=cur+2)) pages.push(i);
  }
  for (const p of pages) {
    if (prev && p-prev > 1) html += `<span class="pg-info">…</span>`;
    html += `<button class="pg-btn ${p===cur?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev = p;
  }
  return html;
}

function onSearch(v) { _query=v; applyAndRender(); }
function onSort(v) {
  if      (v==='name_d')    { _sortBy='name';    _sortDir='desc'; }
  else if (v==='balance_a') { _sortBy='balance'; _sortDir='asc';  }
  else if (v==='name')      { _sortBy='name';    _sortDir='asc';  }
  else                      { _sortBy=v;         _sortDir='desc'; }
  applyAndRender();
}
function setFilter(m) { _filterMode=m; applyAndRender(); }
function goPage(p) {
  _currentPg=p; renderUI();
  document.getElementById('app').scrollIntoView({ behavior:'smooth', block:'start' });
}
</script>
</body>
</html>
