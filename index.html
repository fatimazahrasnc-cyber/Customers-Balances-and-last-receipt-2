<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accounts Receivable Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c10;--surface:#0d1520;--surface2:#111c2a;
    --border:#1e2d40;--border2:#243447;
    --accent:#00d4ff;--accent2:#0099cc;
    --green:#00e5a0;--amber:#ffb340;--red:#ff4d6a;
    --muted:#4a6480;--text:#d0e8ff;--text2:#8aabb8;
    --mono:'IBM Plex Mono',monospace;--sans:'Syne',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;padding:20px;
    background-image:radial-gradient(ellipse 60% 40% at 80% 0%,rgba(0,212,255,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 10% 100%,rgba(0,229,160,.04) 0%,transparent 55%);}

  .header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
  .header h1{font-size:22px;font-weight:800;letter-spacing:-.4px;}
  .header h1 span{color:var(--accent);}
  .header p{font-size:11px;color:var(--muted);margin-top:3px;font-family:var(--mono);}

  .ctrl-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:10px 14px;margin-bottom:22px;
    background:var(--surface);border:1px solid var(--border);border-radius:10px;}
  .load-btn{padding:7px 18px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;
    font-family:var(--sans);background:var(--accent);color:#080c10;transition:opacity .15s,transform .1s;letter-spacing:.3px;}
  .load-btn:hover:not(:disabled){opacity:.88;transform:translateY(-1px);}
  .load-btn:disabled{opacity:.4;cursor:not-allowed;}
  .prog-wrap{flex:1;min-width:80px;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
  .prog-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:2px;transition:width .3s;}
  .status-txt{font-size:11px;color:var(--muted);white-space:nowrap;font-family:var(--mono);}
  .err-box{color:var(--red);background:rgba(255,77,106,.07);border:1px solid rgba(255,77,106,.25);
    border-radius:8px;padding:12px 16px;font-size:13px;margin-bottom:16px;}

  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px;}
  .kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 18px;
    position:relative;overflow:hidden;animation:fadeUp .4s ease both;}
  .kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--accent2),var(--accent));opacity:.7;}
  .kpi-card.green::before{background:linear-gradient(90deg,#00b378,var(--green));}
  .kpi-card.amber::before{background:linear-gradient(90deg,#cc8a00,var(--amber));}
  .kpi-card.red::before{background:linear-gradient(90deg,#cc2240,var(--red));}
  .kpi-label{font-size:10px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
  .kpi-value{font-size:24px;font-weight:800;letter-spacing:-1px;line-height:1.1;}
  .kpi-value.accent{color:var(--accent);}.kpi-value.green{color:var(--green);}.kpi-value.amber{color:var(--amber);}.kpi-value.red{color:var(--red);}
  .kpi-sub{font-size:11px;color:var(--muted);margin-top:5px;font-family:var(--mono);}

  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .search-wrap{position:relative;flex:1;min-width:200px;}
  .search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
  .search-input{width:100%;padding:8px 12px 8px 34px;background:var(--surface);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;transition:border-color .2s;}
  .search-input:focus{border-color:var(--accent);}
  .search-input::placeholder{color:var(--muted);}
  .sort-select{padding:8px 12px;background:var(--surface);border:1px solid var(--border2);
    border-radius:8px;color:var(--text);font-size:13px;font-family:var(--sans);outline:none;cursor:pointer;}
  .filter-btn{padding:6px 13px;border-radius:7px;border:1px solid var(--border2);background:transparent;
    color:var(--text2);font-size:12px;font-family:var(--sans);cursor:pointer;transition:all .15s;}
  .filter-btn.active{background:rgba(0,212,255,.12);border-color:var(--accent);color:var(--accent);}
  .filter-btn:hover:not(.active){color:var(--text);}

  .table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;animation:fadeUp .5s .1s ease both;}
  .table-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);}
  .table-head h2{font-size:14px;font-weight:700;}
  .row-count{font-size:11px;font-family:var(--mono);color:var(--muted);}
  table{width:100%;border-collapse:collapse;}
  thead th{padding:10px 14px;text-align:left;font-size:10px;font-family:var(--mono);font-weight:600;
    text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--surface2);
    border-bottom:1px solid var(--border);white-space:nowrap;}
  thead th.r{text-align:right;}
  tbody tr{border-bottom:1px solid var(--border);transition:background .12s;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:rgba(0,212,255,.035);}
  td{padding:11px 14px;font-size:13px;vertical-align:middle;}
  td.r{text-align:right;font-family:var(--mono);}
  td.dim{color:var(--text2);font-size:12px;font-family:var(--mono);}

  .bal-wrap{display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .bal-amount{font-family:var(--mono);font-size:13px;}
  .bal-bar-track{width:80px;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
  .bal-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent2),var(--accent));}
  .bal-bar-fill.red{background:linear-gradient(90deg,#cc2240,var(--red));}

  .rec-cell{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
  .rec-date{font-size:12px;font-family:var(--mono);color:var(--text);}
  .rec-ref{font-size:10px;font-family:var(--mono);color:var(--muted);}

  .badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-family:var(--mono);font-weight:600;letter-spacing:.5px;}
  .badge-active{background:rgba(0,229,160,.12);color:var(--green);border:1px solid rgba(0,229,160,.25);}
  .badge-inactive{background:rgba(255,77,106,.10);color:var(--red);border:1px solid rgba(255,77,106,.2);}

  .c-green{color:var(--green);}.c-red{color:var(--red);}.c-amber{color:var(--amber);}.c-muted{color:var(--muted);}

  .pagination{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-top:1px solid var(--border);flex-wrap:wrap;}
  .pg-btn{padding:5px 11px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);
    font-size:12px;font-family:var(--mono);cursor:pointer;transition:all .15s;}
  .pg-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
  .pg-btn.active{background:rgba(0,212,255,.15);border-color:var(--accent);color:var(--accent);}
  .pg-btn:disabled{opacity:.35;cursor:not-allowed;}
  .pg-info{font-size:11px;font-family:var(--mono);color:var(--muted);padding:0 6px;}
  .empty-state{padding:50px 20px;text-align:center;color:var(--muted);}
  .empty-state p{font-size:14px;margin-top:10px;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Accounts <span>Receivable</span> Dashboard</h1>
    <p>(invoiced after discount) − received = AR balance · manager.io</p>
  </div>
</div>

<div class="ctrl-bar">
  <button class="load-btn" id="load-btn" onclick="loadAllRecords()">⬇ Load All Records</button>
  <div class="prog-wrap"><div class="prog-bar" id="prog-bar"></div></div>
  <span class="status-txt" id="status-txt">Press Load to fetch data from Manager</span>
</div>

<div id="app"></div>

<script>
/* ══════════════════════════════════
   postMessage helper — DO NOT MODIFY
══════════════════════════════════ */
function postMessageWithResponse(message) {
  return new Promise((resolve, reject) => {
    const requestId = crypto.randomUUID();
    const timer = setTimeout(() => {
      window.removeEventListener('message', handler);
      reject(new Error('Timeout — is this running inside Manager.io?'));
    }, 15000);
    function handler(event) {
      if (event.data?.type?.endsWith('-response') && event.data?.requestId === requestId) {
        clearTimeout(timer);
        window.removeEventListener('message', handler);
        resolve(event.data.body);
      }
    }
    window.addEventListener('message', handler);
    window.parent.postMessage({ ...message, requestId }, '*');
  });
}

/* ══════════════════════════════════
   fetchAllPages
   Follows next_page_token until all pages loaded.
   DO NOT SIMPLIFY to a single fetch.
══════════════════════════════════ */
async function fetchAllPages(endpoint, onProgress) {
  const all=[]; let nextToken=null, pageNum=0, apiTotal=null;
  do {
    const path = nextToken
      ? `${endpoint}?PageSize=99999&next_page_token=${encodeURIComponent(nextToken)}`
      : `${endpoint}?PageSize=99999`;
    const data = await postMessageWithResponse({type:'api-request',method:'GET',path});
    const page = Array.isArray(data) ? data : (data.items||data.data||[]);
    all.push(...page);
    nextToken = data.next_page_token||data.nextPageToken||data._links?.next?.href||null;
    if (apiTotal===null) apiTotal=data.totalCount??data.total??data.count??data._metadata?.totalCount??null;
    pageNum++;
    if (onProgress) onProgress(all.length, apiTotal, pageNum);
    if (pageNum>=1000) break;
  } while(nextToken);
  return all;
}

/* ══════════════════════════════════
   loadAllRecords
══════════════════════════════════ */
async function loadAllRecords() {
  const btn=document.getElementById('load-btn'), bar=document.getElementById('prog-bar'),
        status=document.getElementById('status-txt'), app=document.getElementById('app');
  btn.disabled=true; btn.textContent='Loading…'; bar.style.width='0%'; app.innerHTML='';
  try {
    status.textContent='Fetching customers…';
    const customers = await fetchAllPages('/api4/customer-batch', (n,t)=>{
      status.textContent=`Customers · ${n}${t?'/'+t:''} loaded`; bar.style.width='20%';
    });
    bar.style.width='30%'; status.textContent='Fetching invoices & receipts…';
    const [invoices, receipts] = await Promise.all([
      fetchAllPages('/api4/sales-invoice-batch', (n,t)=>{
        status.textContent=`Invoices ${n}${t?'/'+t:''}…`;
        if(t) bar.style.width=(30+Math.round(n/t*40))+'%';
      }),
      fetchAllPages('/api4/receipt-batch', ()=>{})
    ]);
    bar.style.width='100%';
    status.textContent=`✓ ${customers.length} customers · ${invoices.length} invoices · ${receipts.length} receipts`;
    btn.textContent='↺ Reload'; btn.disabled=false;
    render(customers, invoices, receipts);
  } catch(err) {
    status.textContent='⚠ '+err.message; btn.textContent='↺ Retry'; btn.disabled=false;
    app.innerHTML=`<div class="err-box">⚠ ${err.message}<br><small>Make sure this is running inside Manager.io</small></div>`;
  }
}

/* ══════════════════════════════════════════════════════════
   invoiceLineAmt(line, invoiceItem)

   CONFIRMED from web view screenshot:
     qty=3, unitPrice=100 → Price=300
     discountPercentage=1 → Discount shown "1%"
     Total = 297

   Therefore: discountPercentage is a standard 0–100 percentage.
   Formula: net = gross × (1 − discountPercentage / 100)
   Proof: 300 × (1 − 1/100) = 300 × 0.99 = 297 ✓

   Invoice-level fields:
     item.discount      — bool: discount column is enabled
     item.discountType  — 0 = % per line, 1 = flat amount per line

   Line-level fields:
     line.discountPercentage — 0 to 100 (used when discountType=0)
     line.discountAmount     — flat value (used when discountType=1)

   Pre-computed line.total / line.totalBeforeTax are null in this
   business, so we always compute from raw components.
══════════════════════════════════════════════════════════ */
function invoiceLineAmt(line, invItem) {
  if (!line) return 0;

  const qty   = Number(line.qty            ?? 0);
  const price = Number(line.salesUnitPrice ?? 0);
  const gross = qty * price;

  // Use server-computed total when available and non-zero (most reliable)
  if (line.total          != null && Number(line.total)          !== 0) return Number(line.total);
  if (line.totalBeforeTax != null && Number(line.totalBeforeTax) !== 0) return Number(line.totalBeforeTax);

  // No discount column on this invoice — return gross
  if (!invItem?.discount) return gross;

  const discountType = Number(invItem?.discountType ?? 0);

  if (discountType === 0) {
    // Percentage discount: 0–100 scale confirmed from screenshots
    // discountPercentage=1 → 1% → net = gross × 0.99
    const pct = Number(line.discountPercentage ?? 0);
    return gross * (1 - pct / 100);
  } else {
    // Flat amount discount per line
    const amt = Number(line.discountAmount ?? 0);
    return Math.max(0, gross - amt);
  }
}

/* Sum all lines for one invoice */
function invoiceTotal(inv) {
  const item = inv?.item;
  return (item?.lines ?? []).reduce((s, l) => s + invoiceLineAmt(l, item), 0);
}

/* Sum all line amounts for one receipt */
function receiptLineTotal(item) {
  return (item?.lines ?? []).reduce((s, l) => s + Number(l?.amount ?? 0), 0);
}

/* ══════════════════════════════════
   buildCustomerMap
   Aggregates invoiced, received, balance
   and latest receipt info per customer UUID.
══════════════════════════════════ */
function buildCustomerMap(invoices, receipts) {
  const map = {};
  const ensure = id => {
    if (!map[id]) map[id] = {
      invoiced:0, invoiceCount:0,
      totalReceived:0, receiptCount:0, balance:0,
      latestReceiptDate:null, latestReceiptAmount:0, latestReceiptRef:''
    };
    return map[id];
  };

  for (const inv of invoices) {
    const custId = inv?.item?.customer;
    if (!custId) continue;
    const e = ensure(custId);
    e.invoiced     += invoiceTotal(inv);
    e.invoiceCount += 1;
  }

  for (const rec of receipts) {
    const custId = rec?.item?.customer;
    if (!custId) continue;
    const amount = receiptLineTotal(rec?.item);
    const date   = rec?.item?.date ?? null;
    const ref    = rec?.item?.reference ?? rec?.item?.text ?? '';
    const e = ensure(custId);
    e.totalReceived += amount;
    e.receiptCount  += 1;
    if (date && (!e.latestReceiptDate || new Date(date) > new Date(e.latestReceiptDate))) {
      e.latestReceiptDate   = date;
      e.latestReceiptAmount = amount;
      e.latestReceiptRef    = ref;
    }
  }

  for (const id of Object.keys(map))
    map[id].balance = map[id].invoiced - map[id].totalReceived;

  return map;
}

/* ══════ Helpers ══════ */
const fmtN   = (v,d=2) => Number(v??0).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtDate = v => {
  if (!v) return null;
  const d = new Date(v);
  return isNaN(d) ? String(v) : d.toLocaleDateString(undefined,{day:'2-digit',month:'short',year:'numeric'});
};
const esc = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

/* ══════ App State ══════ */
let _enriched=[], _filtered=[];
let _query='', _sortBy='balance', _sortDir='desc', _filterMode='all', _currentPg=1;
const PAGE_SIZE = 20;

/* ══════════════════════════════════
   render — main entry point after data load
══════════════════════════════════ */
function render(customers, invoices, receipts) {
  const custMap = buildCustomerMap(invoices, receipts);
  _enriched = customers.map(c => ({...c, _ar: custMap[c?.key] ?? null}));
  applyAndRender();
}

function applyAndRender() {
  let data = _enriched.filter(c => {
    const name=(c?.item?.name||'').toLowerCase(), code=(c?.item?.code||'').toLowerCase(), q=_query.toLowerCase();
    if (q && !name.includes(q) && !code.includes(q)) return false;
    if (_filterMode==='active')    return !c?.item?.inactive;
    if (_filterMode==='inactive')  return  c?.item?.inactive;
    if (_filterMode==='balance')   return (c._ar?.balance??0) > 0.005;
    if (_filterMode==='settled')   return (c._ar?.balance??0) <= 0.005 && (c._ar?.invoiceCount??0) > 0;
    if (_filterMode==='noinvoice') return (c._ar?.invoiceCount??0) === 0;
    return true;
  });

  data.sort((a,b) => {
    let va, vb;
    switch (_sortBy) {
      case 'name':        va=(a?.item?.name||'').toLowerCase(); vb=(b?.item?.name||'').toLowerCase(); break;
      case 'code':        va=(a?.item?.code||'');               vb=(b?.item?.code||'');               break;
      case 'balance':     va=a._ar?.balance??-Infinity;         vb=b._ar?.balance??-Infinity;         break;
      case 'invoiced':    va=a._ar?.invoiced??-Infinity;        vb=b._ar?.invoiced??-Infinity;        break;
      case 'received':    va=a._ar?.totalReceived??-Infinity;   vb=b._ar?.totalReceived??-Infinity;   break;
      case 'latest_date':
        va=a._ar?.latestReceiptDate ? new Date(a._ar.latestReceiptDate).getTime() : -Infinity;
        vb=b._ar?.latestReceiptDate ? new Date(b._ar.latestReceiptDate).getTime() : -Infinity; break;
      default:            va=(a?.item?.name||'').toLowerCase(); vb=(b?.item?.name||'').toLowerCase();
    }
    if (va<vb) return _sortDir==='asc'?-1:1;
    if (va>vb) return _sortDir==='asc'?1:-1;
    return 0;
  });

  _filtered=data; _currentPg=1; renderUI();
}

function renderUI() {
  const app = document.getElementById('app');
  if (_enriched.length===0) { app.innerHTML=`<div class="empty-state"><p>No customer records found.</p></div>`; return; }

  const total         = _enriched.length;
  const activeCount   = _enriched.filter(c=>!c?.item?.inactive).length;
  const totalInvoiced = _enriched.reduce((s,c)=>s+(c._ar?.invoiced??0),0);
  const totalReceived = _enriched.reduce((s,c)=>s+(c._ar?.totalReceived??0),0);
  const totalBalance  = totalInvoiced - totalReceived;
  const withBalance   = _enriched.filter(c=>(c._ar?.balance??0)>0.005).length;

  const start    = (_currentPg-1) * PAGE_SIZE;
  const pageRows = _filtered.slice(start, start+PAGE_SIZE);
  const totalPgs = Math.ceil(_filtered.length/PAGE_SIZE) || 1;
  const maxBal   = Math.max(..._enriched.map(c=>Math.abs(c._ar?.balance??0)), 1);

  app.innerHTML = `
    <!-- KPI Cards -->
    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-label">Total Customers</div>
        <div class="kpi-value accent">${total.toLocaleString()}</div>
        <div class="kpi-sub">${activeCount} active · ${total-activeCount} inactive</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">Total Invoiced (net)</div>
        <div class="kpi-value amber">${fmtN(totalInvoiced)}</div>
        <div class="kpi-sub">after line discounts</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Total Received</div>
        <div class="kpi-value green">${fmtN(totalReceived)}</div>
        <div class="kpi-sub">across all receipts</div>
      </div>
      <div class="kpi-card red">
        <div class="kpi-label">AR Balance Outstanding</div>
        <div class="kpi-value red">${fmtN(totalBalance)}</div>
        <div class="kpi-sub">${withBalance} customers with balance</div>
      </div>
    </div>

    <!-- Search + Filters -->
    <div class="toolbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input class="search-input" id="search-inp" placeholder="Search by name or code…"
          value="${esc(_query)}" oninput="onSearch(this.value)">
      </div>
      <select class="sort-select" onchange="onSort(this.value)">
        <option value="balance"     ${_sortBy==='balance'    &&_sortDir==='desc'?'selected':''}>Balance (highest)</option>
        <option value="balance_a"   ${_sortBy==='balance'    &&_sortDir==='asc' ?'selected':''}>Balance (lowest)</option>
        <option value="name"        ${_sortBy==='name'       &&_sortDir==='asc' ?'selected':''}>Name A → Z</option>
        <option value="name_d"      ${_sortBy==='name'       &&_sortDir==='desc'?'selected':''}>Name Z → A</option>
        <option value="invoiced"    ${_sortBy==='invoiced'                      ?'selected':''}>Invoiced ↓</option>
        <option value="received"    ${_sortBy==='received'                      ?'selected':''}>Received ↓</option>
        <option value="latest_date" ${_sortBy==='latest_date'                   ?'selected':''}>Latest Receipt ↓</option>
      </select>
      <button class="filter-btn ${_filterMode==='all'      ?'active':''}" onclick="setFilter('all')">All</button>
      <button class="filter-btn ${_filterMode==='balance'  ?'active':''}" onclick="setFilter('balance')">Outstanding</button>
      <button class="filter-btn ${_filterMode==='settled'  ?'active':''}" onclick="setFilter('settled')">Settled</button>
      <button class="filter-btn ${_filterMode==='active'   ?'active':''}" onclick="setFilter('active')">Active</button>
      <button class="filter-btn ${_filterMode==='noinvoice'?'active':''}" onclick="setFilter('noinvoice')">No Invoices</button>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="table-head">
        <h2>Customer AR Summary</h2>
        <span class="row-count">${_filtered.length.toLocaleString()} matching · ${start+1}–${Math.min(start+PAGE_SIZE,_filtered.length)} shown</span>
      </div>

      ${pageRows.length===0 ? `<div class="empty-state"><p>No results${_query?` for "${esc(_query)}"`:''}</p></div>` : `
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Code</th>
              <th>Status</th>
              <th class="r">Total Invoiced<br><span style="font-weight:400;opacity:.6">(after discount)</span></th>
              <th class="r">Total Received</th>
              <th class="r">AR Balance</th>
              <th class="r">Latest Receipt Date</th>
              <th class="r">Latest Receipt Amt</th>
            </tr>
          </thead>
          <tbody>
            ${pageRows.map((c,i) => {
              const name    = c?.item?.name    || '—';
              const code    = c?.item?.code    || '—';
              const inactive= c?.item?.inactive ?? false;
              const ar      = c._ar;
              const invoiced= ar?.invoiced          ?? 0;
              const received= ar?.totalReceived     ?? 0;
              const balance = ar?.balance           ?? 0;
              const recDate = ar?.latestReceiptDate   ?? null;
              const recAmt  = ar?.latestReceiptAmount ?? 0;
              const recRef  = ar?.latestReceiptRef    ?? '';
              const recCnt  = ar?.receiptCount        ?? 0;
              const invCnt  = ar?.invoiceCount        ?? 0;

              const statusBadge = inactive
                ? '<span class="badge badge-inactive">Inactive</span>'
                : '<span class="badge badge-active">Active</span>';

              const balClass = balance>0.005 ? 'c-red' : balance<-0.005 ? 'c-amber' : 'c-muted';
              const barPct   = maxBal>0 ? Math.round(Math.abs(balance)/maxBal*100) : 0;

              const balCell = invCnt>0
                ? `<div class="bal-wrap">
                     <span class="bal-amount ${balClass}">${fmtN(balance)}</span>
                     <div class="bal-bar-track">
                       <div class="bal-bar-fill ${balance<-0.005?'red':''}" style="width:${barPct}%"></div>
                     </div>
                   </div>`
                : `<span class="c-muted">—</span>`;

              const recCell = recDate
                ? `<div class="rec-cell">
                     <span class="rec-date">${esc(fmtDate(recDate))}</span>
                     ${recRef ? `<span class="rec-ref">ref&nbsp;${esc(recRef)}</span>` : ''}
                   </div>`
                : `<span class="c-muted">—</span>`;

              return `<tr>
                <td class="dim">${start+i+1}</td>
                <td>
                  <div style="font-weight:600">${esc(name)}</div>
                  <div style="font-size:11px;color:var(--muted);font-family:var(--mono);margin-top:1px">
                    ${invCnt} inv · ${recCnt} rec
                  </div>
                </td>
                <td class="dim">${esc(code)}</td>
                <td>${statusBadge}</td>
                <td class="r">${invCnt>0 ? `<span class="c-amber">${fmtN(invoiced)}</span>` : '<span class="c-muted">—</span>'}</td>
                <td class="r">${recCnt>0 ? `<span class="c-green">${fmtN(received)}</span>` : '<span class="c-muted">—</span>'}</td>
                <td class="r">${balCell}</td>
                <td class="r">${recCell}</td>
                <td class="r">${recCnt>0 ? `<span class="c-green">${fmtN(recAmt)}</span>` : '<span class="c-muted">—</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`}

      ${totalPgs>1 ? `
      <div class="pagination">
        <button class="pg-btn" ${_currentPg===1       ?'disabled':''} onclick="goPage(${_currentPg-1})">‹ Prev</button>
        ${buildPagination(_currentPg, totalPgs)}
        <button class="pg-btn" ${_currentPg===totalPgs?'disabled':''} onclick="goPage(${_currentPg+1})">Next ›</button>
        <span class="pg-info">Page ${_currentPg} / ${totalPgs}</span>
      </div>` : ''}
    </div>
  `;
}

function buildPagination(cur, total) {
  let html='', prev=null;
  const pages=[];
  for (let i=1;i<=total;i++) if(i===1||i===total||(i>=cur-2&&i<=cur+2)) pages.push(i);
  for (const p of pages) {
    if (prev && p-prev>1) html+=`<span class="pg-info">…</span>`;
    html+=`<button class="pg-btn ${p===cur?'active':''}" onclick="goPage(${p})">${p}</button>`;
    prev=p;
  }
  return html;
}

function onSearch(v) { _query=v; applyAndRender(); }
function onSort(v) {
  if      (v==='name_d')    { _sortBy='name';    _sortDir='desc'; }
  else if (v==='balance_a') { _sortBy='balance'; _sortDir='asc';  }
  else if (v==='name')      { _sortBy='name';    _sortDir='asc';  }
  else                      { _sortBy=v;         _sortDir='desc'; }
  applyAndRender();
}
function setFilter(m) { _filterMode=m; applyAndRender(); }
function goPage(p) {
  _currentPg=p; renderUI();
  document.getElementById('app').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
</body>
</html>
